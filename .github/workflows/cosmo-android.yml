name: Cosmo Android

on:
  release:
    types: [published]
  push:
    paths:
      - .github/workflows/cosmo-android.yml
      - apps/mobile/**
  pull_request:
    paths:
      - .github/workflows/cosmo-android.yml
      - apps/mobile/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apks:
    name: Build Split Release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      EXPO_USE_PNPM: "1"
      EXPO_ROUTER_APP_ROOT: ./app
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /opt/az || true
          sudo docker system prune -af || true
          df -h

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: './pnpm-lock.yaml'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools'
          cmdline-tools-version: 'latest'
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - name: Accept all Android licenses (Fallback)
        run: |
          yes | sdkmanager --licenses || true
          if [ -d "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" ]; then
            yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          fi
          sdkmanager --list_installed || true

      - name: Install mobile app dependencies
        working-directory: apps/mobile
        run: pnpm install --no-frozen-lockfile

      - name: Clean Managed Assets
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew clean

      - name: Build Android Release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosmo-android-apk-${{ github.run_number }}
          retention-days: 14
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: Publish to GitHub Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
          generate_release_notes: true

