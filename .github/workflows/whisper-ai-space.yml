name: Whisper AI Space

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/whisper-ai-space.yml
      - whisper-ai/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-space:
    name: Deploy Whisper AI Space
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Validate deployment secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$HF_TOKEN"

      - name: Validate Space payload
        run: |
          set -euo pipefail
          test -f whisper-ai/README.md
          test -f whisper-ai/Dockerfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build clean whisper-ai deployment repo
        id: deployment_repo
        run: |
          set -euo pipefail
          repo_dir="$(mktemp -d)"
          cp -a whisper-ai/. "$repo_dir/"
          (
            cd "$repo_dir"
            git init -b main
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Deploy whisper-ai from ${GITHUB_SHA}"
          )
          echo "path=$repo_dir" >> "$GITHUB_OUTPUT"

      - name: Resolve whisper-ai Space URL
        id: whisper_ai_space
        run: |
          set -euo pipefail
          space_url="$(grep -E '^HF_SPACE_ID=' whisper-ai/.env.example | head -n 1 | cut -d '=' -f 2-)"
          if [ -z "$space_url" ]; then
            echo "HF_SPACE_ID is not set in whisper-ai/.env.example" >&2
            exit 1
          fi
          echo "url=$space_url" >> "$GITHUB_OUTPUT"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DEPLOYMENT_REPO_PATH: ${{ steps.deployment_repo.outputs.path }}
          WHISPER_AI_SPACE_URL: ${{ steps.whisper_ai_space.outputs.url }}
        run: |
          set -euo pipefail
          space_host="${WHISPER_AI_SPACE_URL#https://}"
          space_host="${space_host#http://}"
          space_host="${space_host%%/*}"
          space_slug="${space_host%.hf.space}"
          space_owner="${space_slug%%-*}"
          space_name="${space_slug#*-}"
          if [ -z "$space_owner" ] || [ -z "$space_name" ] || [ "$space_name" = "$space_slug" ]; then
            echo "Could not derive Hugging Face repo from $WHISPER_AI_SPACE_URL" >&2
            exit 1
          fi
          cd "$DEPLOYMENT_REPO_PATH"
          git remote add origin "https://${space_owner}:${HF_TOKEN}@huggingface.co/spaces/${space_owner}/${space_name}"
          git push --force origin HEAD:main
